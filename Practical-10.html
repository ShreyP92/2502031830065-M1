<!DOCTYPE html>
<html>
<head>
<style>
.ball {
  width: 80px;
  height: 80px;
  background: red;
  border-radius: 50%;

  animation: bounce 1s infinite alternate;
}

@keyframes bounce {
  from {
    transform: translateY(0);
  }

  to {
    transform: translateY(200px);
  }
}
</style>
</head>

<body>

<div class="ball"></div>

</body>
</html>
