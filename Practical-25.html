<!DOCTYPE html>
<head>
    <title>Date and time</title>
</head>
<body>
    <p id = "demo"></p>
    <script>
        const d = new Date();
        document.getElementById("demo").innerHTML = d;

        const a = new Date(2022, 6, 31, 10, 33, 30, 0);
        document.getElementById("demo").innerHTML = a;


    </script>
    
</body>
</html>
