<html>
<head>
    <title>Arithmatic Operations</title>
</head>
<body>
    <p id ="sumoftwonum"></p>
    <p id ="suboftwonum"></p>
    <p id ="muloftwonum"></p>
    <p id ="divoftwonum"></p>
    <script>

    var x = 50;
    var y = 10;
    var z = x+y;

    var a = 10;
    var b = 2;
    var c = a-b;

    var d = 20;
    var e = 10;
    var f = d*e;

    var g = 10;
    var h = 2;
    var i = g/h;

    document.getElementById("sumoftwonum").innerHTML="Sum of two numbers is : " +z;
    document.getElementById("suboftwonum").innerHTML="Subtraction of two number is : " +c;
    document.getElementById("muloftwonum").innerHTML="Multiplication of two number is : " +f;
    document.getElementById("divoftwonum").innerHTML="Division of two number is : " +i;

    </script>

</body>

</html>
