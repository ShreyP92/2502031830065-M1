<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <table border="4">
        <tr>
        <td align="centre">
            <h1>Registration Form</h1>
        </td>
        </tr>
        <tr>
        <td align="centre">First Name:
        <input type="text" name="First Name:" placeholder="Enter First Name"><br><br>
        </td>
        </tr>
        <tr>
        <td align="centre">Last Name:
        <input type="text" name="Last Name:" placeholder="Enter Last Name"><br><br>
        </td>
        </tr>
        <tr>
        <td align="centre">Contact No:
        <input type="text" name="Contact No:" placeholder="Enter Contact No"><br><br>
         </td>
        </tr>
        <tr>
        <td align="centre">Email:
        <label>Email:</label>
        <input type="text" name="Email:" placeholder="Enter Email ID"><br><br>
        </td>
        </tr>
        <tr>
        <td align="centre">Password:
        <input type="text" name="Password:" placeholder="Enter Password"><br><br>
        </td>
        </tr>
         <tr>
        <td align="centre">Date of Birth:
        <input type="date" name="Date of Birth:"><br><br>
         </td>
        </tr>
        <tr>
        <td align="centre">Age:
        <input type="number" name="Age:" placeholder="Enter Age"><br><br>
        </td>
        </tr>
         <tr>
        <td align="centre">Gender:
        <input type="radio"  name="Male" value="Male">
        <label>Male</label>
        <input type="radio"  name="Female" value="Female">
        <label>Female</label><br><br>
        </td>
        </tr>
        <tr>
        <td align="centre">Address:
        <textarea></textarea><br><br>
         </td>
        </tr>
        <tr>
        <td align="centre">City:
        <input type="text" name="City:" placeholder="Enter City"><br><br>
        </td>
        </tr>
         <tr>
        <td align="centre">Pincode:
        <input type="text" name="Pincode:" placeholder="Enter Pincode"><br><br>
        </td>
        </tr>
         <tr>
        <td align="centre">Joining Date:
        <input type="date" name="Joining Date:"><br><br>
         </td>
        </tr>
        <tr>
        <td align="centre">Confirm Your Form:
        <input type="submit"><input type="reset"><br><br>
        </td>
        </tr>
        </table>    
    </form>
</body>
</html>
