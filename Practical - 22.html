<!DOCTYPE html>
<head>
    <title>Java Script Functions</title>
</head>
<body>

<script>
function foo(p1)
{
    if (typeof(p1) == "number")
        return 0;
    else if (typeof(p1) == "string")
        return "zero";
    else
        return "undefined input";
}

// Display output
document.write(foo(1) + "<br>");
document.write(foo("abc") + "<br>");
document.write(foo() + "<br>");
</script>

</body>
</html>
