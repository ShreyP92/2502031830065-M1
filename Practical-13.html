<html>
    <head><title>Data Types</title></head>
    <body>
        <script>
            var textString = "HelloWorld";
            var numericValue = 98;
            var bigIntValue = 93753666775n;
             var numericArray = [1, 2, 3];
            document.write("HelloWorld : " + typeof textString+"<br>");
            document.write("98 : " + typeof numericValue+"<br>");
            document.write("93753666775n : " + typeof bigIntValue+"<br>");
            document.write("1, 2, 3: " + typeof numericArray + "<br>");
        </script>


    </body>
</html>
