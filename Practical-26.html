<!DOCTYPE html>
<head>
    <title>Object creation</title>
</head>
<body>
    <script>
        var person = new Object();
        
        person.firstName = "Shrey";
        person.lastName = "Patel";

        person.sayHi = ()=>{
            alert("Welcome " + person.firstName + " " + person.lastName)
        }

        person.sayHi();
    </script>

</body>
</html>
