<!DOCTYPE html>
<head>
    <title>Form Validation</title>
</head>
<body>
    <script>
        function validate() {
        var form1 = document.getElementById("RegForm");
        var name = form1.Name.value;
        var email = form1.Email.value;
        var phone = form1.Telephone.value;
        var what = form1.Subject.value;
        var password = form1.Password.value;
        var regEmail=/^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/g;

        var regPhone=/^\d{10}$/;

        if (name == "") {
            window.alert("Please enter your name");
            return false;
        }
        else if (email == "" || !regEmail.test(email)) {
            window.alert("Please enter a valide e-mail address");
            return false;
        }
        else if (password == ""){
            window.alert("Please enter a valide password");
            return false;
        }
        else if (password.length < 6){
            alert("Password should be atleast 6 characters long");
            return false;
        }
        else if (phone == "" || !regPhone.test(phone)){
            alert("Please enter a valide phone number");
            return false;
        }
        else if (what.selectedIndex == -1) {
            alert("Please enter your course");
            return false;
        }
    }
    </script>
    
    <form name = "RegForm" method="post" id="RegForm" onsubmit="return validate()" >
        <table>
            <tr>
                <td colspan="2"><h1 style="text-align: center;">Registration Form</h1></td>
            </tr>
            <tr>
                <td>Name: </td>
                <td><input type = "text" size="40" name="Name" /><br></td>
            </tr>
             <tr>
                <td>E-mail Address: </td>
                <td><input type = "text" size="40" name="Email" /><br></td>
            </tr>   
             <tr>
                <td>Password: </td>
                <td><input type = "text" size="40" name="Password" /><br></td>
            </tr>   
            <tr>
                <td>Mobile: </td>
                <td><input type = "text" size="40" name="Telephone" /><br></td>
            </tr> 
             <tr>
                <td>Select Your Course: </td>
                <td><select type = "text" name="Subject">
                    <option>B.Tech</option>
                    <option>M.Tech</option>
                    <option>BCA</option>
                    <option>MCA</option>
                </select><br>
                </td>   
            </tr>  
            <tr>
                <td>Comments: </td>
                <td><textarea cols="40" name="Comment"></textarea><br></td>
            </tr>  
            <tr>
                <td>Comments: </td>
                <td><input type = "submit" value="Submit" name="Submit"/> &nbsp; <input type = "reset" value="Reset" name="Reset"/><br></td>
            </tr>                 
        </table>
        </form>
</body>
</html>
