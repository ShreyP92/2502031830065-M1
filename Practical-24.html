<!DOCTYPE html>
<head>
    <title>Math Function</title>
</head>
<body>
    <script>
        document.writeln(Math.E);

        var a = Math.pow(2,3);
        document.writeln(a);

        var num = Math.random();
        document.write(num);

        var num2 = parseInt(1 + (Math.random() * 100));

        document.write(num2);

        document.write(Math.ceil(2,7));
        document.write(Math.floor(2,7));
        document.write(Math.round(2,7));
        

    </script>
    
</body>
</html>
